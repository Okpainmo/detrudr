<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Detrudr Login</title>
  <link rel="icon" type="image/png" href="/public/logo.png">
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
    @theme {
      --font-sans: "Inter", system-ui, sans-serif;
      --color-brand-100: #fffaf2;
      --color-brand-500: #e25822;
      --color-brand-600: #b43d11; 
      --color-dark-bg: #0b0f19;
      --color-dark-card: rgba(20, 25, 35, 0.7);
    }
    body {
        font-family: var(--font-sans);
    }
  </style>
</head>

<body class="min-h-screen flex items-center justify-center bg-dark-bg text-slate-200 relative overflow-hidden p-3">
  <!-- Dynamic Background / Gradient -->
  <div class="absolute inset-0 z-0 flex justify-center items-center overflow-hidden pointer-events-none">
    <div class="absolute w-[600px] h-[600px] bg-brand-500/20 rounded-full blur-[100px] animate-pulse"></div>
  </div>

  <main
    class="relative z-10 w-full max-w-md p-4 sm:p-6 md:p-8 bg-dark-card backdrop-blur-xl border border-white/10 rounded-2xl shadow-2xl shadow-brand-500/5 transition-all duration-300 hover:shadow-brand-500/10 hover:border-white/20">
    <div class="mb-8 text-center hover:scale-105 transition-transform duration-500">
      <div
        class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-brand-500 to-brand-600 mb-3 shadow-lg shadow-brand-500/30 ring-1 ring-white/20">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"
          xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z">
          </path>
        </svg>
      </div>
      <h1 class="text-3xl font-bold tracking-tight text-white drop-shadow-md">Detrudr</h1>
      <p class="text-xs tracking-widest text-slate-400 mt-2 uppercase font-semibold">Admin Dashboard</p>
    </div>

    <p
      class="{{error_hidden}} text-sm text-red-400 text-center mb-3 font-medium bg-red-500/10 rounded-lg px-4 py-2 w-max mx-auto border border-red-500/20">
      {{error}}</p>

    <form method="post" action="/auth" class="space-y-6">
      <div class="space-y-2 group">
        <label for="email"
          class="block text-xs font-bold uppercase tracking-widest text-slate-400 group-focus-within:text-brand-500 transition-colors pl-1">Email</label>
        <input id="email" name="email" type="email" autocomplete="username" required
          class="w-full px-4 py-3.5 bg-slate-900/60 border border-slate-700/80 rounded-xl text-white font-medium placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-brand-500/50 focus:border-brand-500 transition-all duration-300 shadow-inner"
          placeholder="admin@domain.com" />
      </div>

      <div class="space-y-2 group">
        <label for="password"
          class="block text-xs font-bold uppercase tracking-widest text-slate-400 group-focus-within:text-brand-500 transition-colors pl-1">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required
          class="w-full px-4 py-3.5 bg-slate-900/60 border border-slate-700/80 rounded-xl text-white font-medium placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-brand-500/50 focus:border-brand-500 transition-all duration-300 shadow-inner"
          placeholder="••••••••" />
      </div>

      <button type="submit"
        class="w-full py-4 mt-4 rounded-xl bg-gradient-to-r from-brand-600 to-brand-500 text-white text-sm font-bold tracking-widest uppercase hover:from-brand-500 hover:to-brand-500 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-dark-bg focus:ring-brand-500 transition-all duration-300 shadow-lg shadow-brand-500/25 hover:shadow-brand-500/40 relative overflow-hidden group">
        <span class="relative z-10 flex items-center justify-center gap-3">
          Secure Login
          <svg class="w-5 h-5 group-hover:translate-x-1.5 transition-transform" fill="none" stroke="currentColor"
            viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
          </svg>
        </span>
      </button>
    </form>

    <p class="mt-8 text-sm text-center text-slate-500 font-medium">
      Forgot access? <a href="#"
        class="text-brand-500 hover:text-brand-400 transition-colors ml-1 uppercase tracking-wider">Contact Infra
        Admin</a>
    </p>
  </main>


</body>

</html>
