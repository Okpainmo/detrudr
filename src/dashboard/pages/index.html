<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Detrudr Dashboard</title>
  <link rel="icon" type="image/png" href="/public/logo.png">
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style type="text/tailwindcss">
    @theme {
      --font-sans: "Inter", system-ui, sans-serif;
      --color-brand-400: #fb923c;
      --color-brand-500: #e25822;
      --color-brand-600: #b43d11; 
      --color-dark-bg: #0b0f19;
      --color-dark-card: rgba(20, 25, 35, 0.6);
      --color-dark-border: rgba(255, 255, 255, 0.08);
    }
    body {
        font-family: var(--font-sans);
    }
    /* Custom Scrollbar for Pre/Tables */
    ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
    }
    ::-webkit-scrollbar-track {
        background: transparent;
    }
    ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.2);
    }
  </style>
</head>

<body class="min-h-screen bg-dark-bg text-slate-200 relative p-4 md:p-8">
  <!-- Dynamic Gradient Background -->
  <div class="fixed inset-0 z-0 flex justify-center items-center overflow-hidden pointer-events-none">
    <div
      class="absolute top-[-20%] left-[-10%] w-[800px] h-[800px] bg-brand-600/10 rounded-full blur-[120px] animate-pulse">
    </div>
    <div class="absolute bottom-[-20%] right-[-10%] w-[600px] h-[600px] bg-blue-900/20 rounded-full blur-[100px]"
      style="animation: pulse 8s infinite alternate;"></div>
  </div>

  <div class="relative z-10 max-w-7xl mx-auto space-y-8">
    <header class="flex items-center justify-between pb-6 border-b border-white/10">
      <div class="flex items-center gap-4">
        <div
          class="flex items-center justify-center w-12 h-12 rounded-xl bg-gradient-to-br from-brand-500 to-brand-600 shadow-lg shadow-brand-500/20 hover:scale-105 transition-transform cursor-pointer">
          <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"
            xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z">
            </path>
          </svg>
        </div>
        <div>
          <h1
            class="text-2xl font-bold tracking-tight text-white hover:text-transparent hover:bg-clip-text hover:bg-gradient-to-r hover:from-brand-400 hover:to-white transition-all duration-300">
            Detrudr</h1>
          <p
            class="text-[10px] sm:text-xs font-semibold tracking-wider text-slate-400 uppercase flex items-center gap-2 mt-1">
            <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span> Traffic Anomaly Detection Is Active
          </p>
        </div>
      </div>
      <div id="live-indicator"
        class="hidden md:flex px-4 py-2 rounded-full bg-slate-800/50 border border-slate-700 backdrop-blur-sm text-xs font-medium text-slate-300 items-center gap-2 transition-all duration-300">
        <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
        <span class="hidden sm:inline">Refreshing...</span>
      </div>
    </header>

    <!-- Metrics Grid -->
    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-6" id="cards"></div>

    <!-- Wide Sections -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
      <div
        class="group bg-dark-card backdrop-blur-xl border border-dark-border rounded-xl p-5 hover:border-brand-500/30 transition-all duration-300 shadow-xl overflow-hidden flex flex-col h-[400px]">
        <div class="flex items-center gap-3 mb-4 border-b border-white/5 pb-3">
          <svg class="w-5 h-5 text-brand-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9">
            </path>
          </svg>
          <h2 class="text-xs font-bold tracking-widest text-slate-300 uppercase">Top Source IPs</h2>
        </div>
        <div id="top-ips" class="flex-1 overflow-auto rounded-lg"></div>
      </div>

      <div
        class="group bg-dark-card backdrop-blur-xl border border-dark-border rounded-xl p-5 hover:border-red-500/30 transition-all duration-300 shadow-xl overflow-hidden flex flex-col h-[400px]">
        <div class="flex items-center gap-3 mb-4 border-b border-white/5 pb-3">
          <svg class="w-5 h-5 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z">
            </path>
          </svg>
          <h2 class="text-xs font-bold tracking-widest text-slate-300 uppercase">Banned IPs</h2>
        </div>
        <div id="bans" class="flex-1 overflow-auto rounded-lg"></div>
      </div>

      <!-- Baseline Graph -->
      <div
        class="lg:col-span-2 group bg-dark-card backdrop-blur-xl border border-dark-border rounded-xl p-5 hover:border-brand-500/30 transition-all duration-300 shadow-xl flex flex-col min-h-[300px]">
        <div class="flex items-center justify-between mb-4 border-b border-white/5 pb-3">
          <div class="flex items-center gap-3">
            <svg class="w-5 h-5 text-brand-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z"></path>
            </svg>
            <h2 class="text-xs font-bold tracking-widest text-slate-300 uppercase">Baseline History (Effective Mean)
            </h2>
          </div>
          <span
            class="px-2 py-1 rounded bg-brand-500/10 text-brand-400 text-[10px] font-bold uppercase tracking-wider border border-brand-500/20">24hr
            Analytics</span>
        </div>
        <div class="flex-1 relative w-full h-[220px]">
          <canvas id="baseline-chart"></canvas>
        </div>
      </div>

      <div
        class="lg:col-span-2 group bg-dark-card backdrop-blur-xl border border-dark-border rounded-xl p-5 hover:border-blue-500/30 transition-all duration-300 shadow-xl flex flex-col min-h-[350px]">
        <div class="flex items-center justify-between mb-4 border-b border-white/5 pb-3">
          <div class="flex items-center gap-3">
            <svg class="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z">
              </path>
            </svg>
            <h2 class="text-xs font-bold tracking-widest text-slate-300 uppercase">Live Audit Tail</h2>
          </div>
          <span
            class="px-2 py-1 rounded bg-blue-500/20 text-blue-400 text-[10px] font-bold uppercase tracking-wider border border-blue-500/30">Auto-tail</span>
        </div>
        <div id="audit"
          class="flex-1 overflow-auto bg-[#050810]/80 p-5 rounded-lg font-mono text-[13px] text-green-400/90 border border-black/50 shadow-inner">
        </div>
      </div>
    </div>
  </div>

  <!-- FLOATING LOGOUT COMPONENT -->
  <button id="logout-btn"
    class="fixed bottom-6 right-6 w-14 h-14 bg-gradient-to-br from-brand-500 to-brand-600 rounded-full flex items-center justify-center shadow-[0_0_20px_rgba(226,88,34,0.1)] hover:-translate-y-1 hover:shadow-brand-500/40 hover:from-brand-600 hover:to-brand-500 hover:scale-105 transition-all duration-300 z-40 group cursor-pointer">
    <svg class="w-6 h-6 text-white group-hover:rotate-12 transition-colors" fill="none" stroke="currentColor"
      viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
        d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
    </svg>
  </button>

  <div id="logout-modal"
    class="fixed inset-0 z-50 hidden bg-[#050810]/80 backdrop-blur-md flex items-center justify-center opacity-0 transition-opacity duration-300">
    <div
      class="bg-dark-card border border-dark-border p-6 rounded-2xl shadow-2xl shadow-brand-500/10 max-w-sm w-full transform scale-95 transition-transform duration-300">
      <div class="flex items-center gap-3 mb-4 border-b border-white/5 pb-4">
        <!-- <div class="w-10 h-10 rounded-full bg-brand-500/20 flex items-center justify-center text-brand-500">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
          </svg>
        </div> -->
        <h3 class="text-lg font-bold text-white tracking-widest uppercase text-sm">Terminate Session</h3>
      </div>
      <p class="text-[13px] text-slate-400 mb-6 font-medium leading-relaxed">Are you sure you want to terminate the
        secure session and exit the dashboard?</p>
      <div class="flex justify-end gap-3 flex-row-reverse">
        <button id="logout-confirm"
          class="px-5 py-2.5 text-xs tracking-widest font-bold text-white uppercase bg-brand-600 hover:bg-brand-500 rounded-lg shadow-lg shadow-brand-500/20 transition-all border border-brand-500/50 cursor-pointer">Confirm</button>
        <button id="logout-cancel"
          class="px-5 py-2.5 text-xs tracking-widest font-bold text-slate-300 uppercase hover:text-white bg-slate-800/80 hover:bg-slate-700/80 border border-slate-700 rounded-lg transition-colors cursor-pointer">Cancel</button>
      </div>
    </div>
  </div>

  <!-- FLOATING LOGOUT ... -->
  <script>
    // --- Logout Logic ---
    const logoutBtn = document.getElementById('logout-btn');
    const logoutModal = document.getElementById('logout-modal');
    const logoutCancel = document.getElementById('logout-cancel');
    const logoutConfirm = document.getElementById('logout-confirm');

    logoutBtn.addEventListener('click', () => {
      logoutModal.classList.remove('hidden');
      setTimeout(() => {
        logoutModal.classList.remove('opacity-0');
        logoutModal.firstElementChild.classList.remove('scale-95');
      }, 10);
    });

    const hideModal = () => {
      logoutModal.classList.add('opacity-0');
      logoutModal.firstElementChild.classList.add('scale-95');
      setTimeout(() => logoutModal.classList.add('hidden'), 300);
    };

    logoutCancel.addEventListener('click', hideModal);
    logoutModal.addEventListener('click', (e) => { if (e.target === logoutModal) hideModal() });

    logoutConfirm.addEventListener('click', () => {
      window.location.href = '/logout';
    });

    // --- Core Render Logic ---
    let chartInstance = null;

    async function render() {
      const ind = document.getElementById('live-indicator');
      ind.classList.add('text-brand-400', 'border-brand-500/50', 'bg-brand-500/10');

      try {
        const res = await fetch('/metrics', { cache: 'no-store' });
        if (!res.ok) { window.location.reload(); return; }
        const data = await res.json();

        const cards = [
          ['Global req/s', data.global_req_per_sec],
          ['Current req/s', data.current_second_requests],
          ['CPU Usage (%)', data.cpu_percent],
          ['Memory (MB)', data.memory_mb],
          ['Baseline mean', typeof data.global_baseline?.mean === 'number' ? data.global_baseline.mean.toFixed(2) : '0.00'],
          ['Baseline stddev', typeof data.global_baseline?.stddev === 'number' ? data.global_baseline.stddev.toFixed(2) : '0.00'],
          ['Uptime (s)', data.uptime],
        ];

        document.getElementById('cards').innerHTML = cards.map(([k, v]) => `
          <div class="bg-dark-card backdrop-blur-md border border-dark-border rounded-2xl p-5 hover:-translate-y-1 hover:border-brand-500/40 transition-all duration-300 shadow-lg hover:shadow-brand-500/10 group">
            <div class="text-[10px] md:text-[11px] font-bold text-slate-400 uppercase tracking-widest group-hover:text-brand-400 transition-colors">${escapeHtml(k)}</div>
            <div class="text-2xl md:text-3xl font-black text-white mt-3 font-mono drop-shadow-md break-words tracking-tight">${escapeHtml(String(v))}</div>
          </div>
        `).join('');

        document.getElementById('top-ips').innerHTML = table(['ip', 'requests'], data.top_ips, "text-blue-400 hover:bg-slate-800/60");
        document.getElementById('bans').innerHTML = table(['ip', 'until', 'strikes'], data.banned_ips, "text-red-400 hover:bg-red-900/20");

        document.getElementById('audit').innerHTML = `<pre class="whitespace-pre-wrap break-words leading-relaxed">${escapeHtml((data.audit_tail || []).join('\n'))}</pre>`;

        // Chart.js updates
        const history = data.global_baseline?.history || [];
        if (history.length) {
          const labels = history.map(h => {
            const d = new Date(h.timestamp);
            return `${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}`;
          });
          const meanData = history.map(h => h.effective_mean);

          if (chartInstance) {
            chartInstance.data.labels = labels;
            chartInstance.data.datasets[0].data = meanData;
            chartInstance.update('none');
          } else {
            const ctx = document.getElementById('baseline-chart').getContext('2d');
            chartInstance = new Chart(ctx, {
              type: 'line',
              data: {
                labels,
                datasets: [{
                  label: 'Effective Mean',
                  data: meanData,
                  borderColor: '#fb923c',
                  backgroundColor: 'rgba(251, 146, 60, 0.15)',
                  borderWidth: 2,
                  pointRadius: 2,
                  pointHoverRadius: 4,
                  pointBackgroundColor: '#e25822',
                  fill: true,
                  tension: 0.4
                }]
              },
              options: {
                responsive: true,
                maintainAspectRatio: false,
                animation: { duration: 0 },
                hover: { animationDuration: 0 },
                responsiveAnimationDuration: 0,
                plugins: { legend: { display: false }, tooltip: { enabled: true, mode: 'index', intersect: false } },
                scales: {
                  x: { ticks: { color: '#64748b', font: { size: 10 } }, grid: { color: 'rgba(255,255,255,0.03)' } },
                  y: { ticks: { color: '#64748b', font: { size: 10 } }, grid: { color: 'rgba(255,255,255,0.03)', borderDash: [4, 4] } }
                }
              }
            });
          }
        }
      } catch (e) {
        console.error("Fetch error", e);
      } finally {
        setTimeout(() => ind.classList.remove('text-brand-400', 'border-brand-500/50', 'bg-brand-500/10'), 500);
      }
    }

    function table(headers, rows, trHoverClass = "text-slate-200 bg-slate-800/30") {
      const head = `<tr class="border-b border-slate-700/50 text-[10px] md:text-[11px] uppercase tracking-widest text-slate-400">${headers.map(h => `<th class="py-3 px-4 font-bold text-left">${escapeHtml(h)}</th>`).join('')}</tr>`;
      const body = (rows || []).map(row => `
        <tr class="border-b border-white/5 transition-colors duration-200 ${trHoverClass}">
          ${headers.map((h, i) => `<td class="py-3 px-4 font-mono text-sm ${i === 0 ? 'font-bold' : ''}">${escapeHtml(String(row[h] ?? ''))}</td>`).join('')}
        </tr>`).join('');
      return `<table class="w-full text-left border-collapse whitespace-nowrap overflow-hidden rounded-lg"><thead class="bg-slate-900/90 sticky top-0 backdrop-blur-xl z-20">${head}</thead><tbody>${body}</tbody></table>`;
    }

    function escapeHtml(value) {
      if (value === undefined || value === null) return '';
      return String(value).replace(/[&<>"']/g, char => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[char]));
    }

    render();
    setInterval(render, 3000);
  </script>
</body>

</html>
